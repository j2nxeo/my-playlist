<!DOCTYPE html>

<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>최애 앨범 소개</title>

    
<link rel="stylesheet" href="style.css">
    <style>

        /* 여기서부터 자유롭게 코딩을 시작하세요! */
    

        /* (강사님이 주신 필수 색상 2개 잊지 마세요!) */



        * {

            margin: 0;

            padding: 0;

            /* 테두리 두께를 크기에 포함시키는 마법의 속성 (나중에 배웁니다!) */

            box-sizing: border-box; 

        }



        body {

            /* 0. 배경색과 기본 폰트 설정, 전체 여백 */

            padding: 20px;

        }



        /* 1. 타이포그래피 (h1, h2, .artist-name 등) 폰트, 색상, 크기, 정렬 */





        /* 2. 가사 영역 (.lyrics-box) 및 하이라이트 글자(.highlight) 강조 */





        /* 3. 목록(#charm-list) 불릿 기호 지우고 예쁘게 꾸미기 */





        /* 4. 표(#track-table) 한 줄 테두리(border-collapse), 패딩, 짝수줄 배경색(:nth-child) */





        /* 5. 버튼(.listen-btn) 꾸미고 호버(:hover) 효과 넣기 */



    </style>

</head>

<body>

    <header id="album-header">

        <p class="artist-name">롤러코스터</p>

        <h1>습관 (bye bye)</h1>

        <p class="subtitle">올드스쿨한 매력으로 가득 찬 플레이리스트</p>

    </header>



    <section class="lyrics-section">

        <h2>🎵 킬링 파트 가사</h2>

        <div class="lyrics-box">

            <p>사랑해 오늘도 얘기해 믿을 수 없겠지만</p>

            <p class="highlight">안녕 이제 그만 너를 보내야지</p>

            <p>그건 너무 어려운 얘기</p>

        </div>

    </section>



    <section class="info-section">

        <h2>✨ 감상 포인트</h2>

        <ul id="charm-list">

            <li>나른하고 안정감을 주는 목소리</li>

            <li>절절하고 진정성 있는 가사</li>

            <li>중독성 있는 멜로디</li>

        </ul>

    </section>



    <section class="track-section">

        <h2>🎧 추천 플레이리스트</h2>

        <table id="track-table">

            <thead>

                <tr>

                    <th>Track</th>

                    <th>곡명</th>

                    <th>Play Time</th>

                </tr>

            </thead>

            <tbody>

                <tr>

                    <td>01</td>

                    <td>습관</td>

                    <td>2:34</td>

                </tr>

                <tr>

                    <td>02</td>

                    <td>혜화동</td>

                    <td>2:46</td>

                </tr>

                <tr>

                    <td>03</td>

                    <td>가을아침</td>

                    <td>2:57</td>

                </tr>

                <tr>

                    <td>04</td>

                    <td>터치드 야경</td>

                    <td>3:15</td>

                </tr>

                <tr>

                    <td>05</td>

                    <td>사건의 지평선</td>

                    <td>3:03</td>

                </tr>

                <tr>

                    <td>06</td>

                    <td>밤이 깊었네</td>

                    <td>2:56</td>

                </tr>

            </tbody>

        </table>

    </section>



    <footer id="album-footer">

        <button class="listen-btn">전곡 스밍하러 가기</button>

    </footer>

</body>

</html>
